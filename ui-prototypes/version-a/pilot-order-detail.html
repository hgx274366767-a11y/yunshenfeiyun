<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云深飞运飞手端 - 任务执行</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F7FA;
            min-height: 100vh;
        }
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px;
            background: linear-gradient(135deg, #1E3A5F 0%, #2D5A87 100%);
        }
        .navbar-back { font-size: 14px; color: white; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .navbar-title { font-size: 17px; font-weight: 600; color: white; }
        .container { padding: 12px 16px; max-width: 420px; margin: 0 auto; }
        .status-card {
            background: linear-gradient(135deg, #4361EE 0%, #3B82F6 100%);
            border-radius: 16px; padding: 20px;
            color: white; margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(67, 97, 238, 0.3);
        }
        .status-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .status-badge {
            padding: 6px 14px; font-size: 12px; font-weight: 600;
            background: rgba(255,255,255,0.2); border-radius: 12px;
        }
        .status-order-id { font-size: 13px; opacity: 0.8; }
        .status-route {
            display: flex; align-items: center; gap: 16px;
            margin-bottom: 24px;
        }
        .route-point { flex: 1; }
        .route-label { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
        .route-address { font-size: 18px; font-weight: 600; }
        .route-line {
            width: 60px; height: 2px;
            background: rgba(255,255,255,0.4);
            position: relative;
        }
        .route-arrow {
            position: absolute; right: -6px; top: -5px;
            width: 0; height: 0;
            border-left: 8px solid rgba(255,255,255,0.4);
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
        }
        .status-actions { display: flex; gap: 10px; }
        .status-btn {
            flex: 1; height: 44px; font-size: 14px; font-weight: 600;
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .status-btn.secondary {
            background: rgba(255,255,255,0.2); color: white; border: none;
        }
        .status-btn.primary {
            background: white; color: #4361EE; border: none;
        }
        .section { margin-bottom: 16px; }
        .section-header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 0;
        }
        .section-icon {
            width: 28px; height: 28px; border-radius: 7px;
            background: #F0F5FF; display: flex; align-items: center; justify-content: center;
        }
        .section-icon i { font-size: 12px; color: #4361EE; }
        .section-title { font-size: 14px; font-weight: 600; color: #1A1A1A; }
        .info-card {
            background: white; border-radius: 12px; padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .info-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }
        .info-item { display: flex; align-items: center; gap: 12px; }
        .info-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: #F0F5FF; display: flex; align-items: center; justify-content: center;
        }
        .info-icon i { font-size: 16px; color: #4361EE; }
        .info-content { flex: 1; }
        .info-value { font-size: 17px; font-weight: 600; color: #1A1A1A; }
        .info-label { font-size: 12px; color: #BFBFBF; }
        .cargo-card {
            background: white; border-radius: 12px; padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .cargo-row {
            display: flex; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid #F5F5F5;
        }
        .cargo-row:last-child { border-bottom: none; }
        .cargo-label { color: #999; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .cargo-label i { font-size: 12px; }
        .cargo-value { color: #1A1A1A; font-size: 13px; font-weight: 500; }
        .contact-card {
            background: white; border-radius: 12px; padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            display: flex; align-items: center; justify-content: space-between;
        }
        .contact-info { display: flex; align-items: center; gap: 12px; }
        .contact-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, #4361EE 0%, #3B82F6 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .contact-avatar i { font-size: 18px; color: white; }
        .contact-name { font-size: 15px; font-weight: 600; color: #1A1A1A; }
        .contact-phone { font-size: 12px; color: #999; }
        .call-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: #52C41A; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .call-btn i { font-size: 18px; color: white; }
        .tabbar {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; background: white;
            border-top: 1px solid #ECECEC;
            padding: 6px 0;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tabbar-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            padding: 6px 0; font-size: 10px; color: #BFBFBF;
            cursor: pointer;
        }
        .tabbar-item.active { color: #4361EE; }
        .tabbar-icon { font-size: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <span class="navbar-back"><i class="fas fa-chevron-left"></i> 返回</span>
        <span class="navbar-title">任务详情</span>
        <span style="width: 60px;"></span>
    </div>
    
    <div class="container">
        <div class="status-card">
            <div class="status-header">
                <span class="status-order-id">#20240612001</span>
                <span class="status-badge"><i class="fas fa-spinner fa-spin"></i> 执行中</span>
            </div>
            <div class="status-route">
                <div class="route-point">
                    <div class="route-label">起始</div>
                    <div class="route-address">重庆渝北</div>
                </div>
                <div class="route-line">
                    <div class="route-arrow"></div>
                </div>
                <div class="route-point">
                    <div class="route-label">目的</div>
                    <div class="route-address">四川广安</div>
                </div>
            </div>
            <div class="status-actions">
                <button class="status-btn secondary"><i class="fas fa-phone"></i> 联系用户</button>
                <button class="status-btn primary"><i class="fas fa-check-circle"></i> 完成任务</button>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <div class="section-icon"><i class="fas fa-plane"></i></div>
                <span class="section-title">飞行参数</span>
            </div>
            <div class="info-card">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-road"></i></div>
                        <div class="info-content">
                            <div class="info-value">15.5 km</div>
                            <div class="info-label">距离</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-weight-hanging"></i></div>
                        <div class="info-content">
                            <div class="info-value">250 kg</div>
                            <div class="info-label">重量</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-mountain"></i></div>
                        <div class="info-content">
                            <div class="info-value">350 m</div>
                            <div class="info-label">落差</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-clock"></i></div>
                        <div class="info-content">
                            <div class="info-value">2小时内</div>
                            <div class="info-label">时效</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <div class="section-icon"><i class="fas fa-box"></i></div>
                <span class="section-title">货物信息</span>
            </div>
            <div class="cargo-card">
                <div class="cargo-row">
                    <span class="cargo-label"><i class="fas fa-tag"></i> 货物描述</span>
                    <span class="cargo-value">新鲜脐橙 500箱</span>
                </div>
                <div class="cargo-row">
                    <span class="cargo-label"><i class="fas fa-yen-sign"></i> 货物价值</span>
                    <span class="cargo-value">￥15,000</span>
                </div>
                <div class="cargo-row">
                    <span class="cargo-label"><i class="fas fa-comment-dots"></i> 备注</span>
                    <span class="cargo-value">需要轻拿轻放</span>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <div class="section-icon"><i class="fas fa-user"></i></div>
                <span class="section-title">用户信息</span>
            </div>
            <div class="contact-card">
                <div class="contact-info">
                    <div class="contact-avatar"><i class="fas fa-user"></i></div>
                    <div>
                        <div class="contact-name">张经理</div>
                        <div class="contact-phone">138****8888</div>
                    </div>
                </div>
                <button class="call-btn">
                    <i class="fas fa-phone"></i>
                </button>
            </div>
        </div>
    </div>
    
    <div class="tabbar">
        <div class="tabbar-item">
            <i class="tabbar-icon fas fa-clipboard-list"></i>
            <span>接单</span>
        </div>
        <div class="tabbar-item active">
            <i class="tabbar-icon fas fa-helicopter"></i>
            <span>任务</span>
        </div>
        <div class="tabbar-item">
            <i class="tabbar-icon fas fa-user"></i>
            <span>我的</span>
        </div>
    </div>
</body>
</html>
