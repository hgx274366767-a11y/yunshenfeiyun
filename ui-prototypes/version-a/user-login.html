<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云深飞运 - 登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F7FA;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-top: 60px;
            margin-bottom: 40px;
        }
        .logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #4361EE 0%, #3B82F6 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(67, 97, 238, 0.3);
        }
        .logo i { font-size: 32px; color: white; }
        .title { font-size: 24px; font-weight: 700; color: #1A1A1A; margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: #999; }
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .role-switch {
            display: flex; gap: 10px; margin-bottom: 24px;
            background: #F5F7FA; border-radius: 10px; padding: 4px;
        }
        .role-btn {
            flex: 1; height: 44px; font-size: 14px; font-weight: 600;
            border: none; border-radius: 8px;
            background: transparent; color: #999;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .role-btn.active { background: white; color: #4361EE; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .role-btn i { font-size: 14px; }
        .input-group { margin-bottom: 18px; }
        .input-label { display: block; font-size: 13px; font-weight: 500; color: #666; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input {
            width: 100%; height: 48px; padding: 0 14px;
            font-size: 15px; border: 1px solid #E8E8E8;
            border-radius: 8px; background: #F8F8F8;
            outline: none; transition: all 0.2s;
        }
        .input:focus { border-color: #4361EE; background: white; }
        .input::placeholder { color: #BFBFBF; }
        .sms-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            padding: 6px 14px; font-size: 13px; font-weight: 600;
            color: #4361EE; background: #F0F5FF;
            border: none; cursor: pointer; border-radius: 6px;
        }
        .sms-btn:hover { background: #E0EAFF; }
        .btn-primary {
            width: 100%; height: 50px; font-size: 16px; font-weight: 600;
            color: white; background: #4361EE;
            border: none; border-radius: 10px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
            margin-top: 8px;
        }
        .btn-primary:hover { background: #3651DE; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #BFBFBF; }
        .footer a { color: #4361EE; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-helicopter"></i>
            </div>
            <h1 class="title">云深飞运</h1>
            <p class="subtitle">川渝首个无人机吊运服务平台</p>
        </div>
        
        <div class="form-card">
            <div class="role-switch">
                <button type="button" class="role-btn active"><i class="fas fa-user"></i> 用户登录</button>
                <button type="button" class="role-btn"><i class="fas fa-headset"></i> 飞手登录</button>
            </div>
            
            <div class="input-group">
                <label class="input-label">手机号</label>
                <div class="input-wrapper">
                    <input type="tel" class="input" placeholder="请输入手机号" maxlength="11">
                </div>
            </div>
            
            <div class="input-group">
                <label class="input-label">验证码</label>
                <div class="input-wrapper">
                    <input type="text" class="input" placeholder="请输入验证码" maxlength="6">
                    <button type="button" class="sms-btn">获取验证码</button>
                </div>
            </div>
            
            <button type="submit" class="btn-primary">登录</button>
        </div>
        
        <div class="footer">登录即表示同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></div>
    </div>
</body>
</html>
